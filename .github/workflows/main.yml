name: EarTrumpet
on:
  push:
    branches:
      - master
      - dev
      - rafael/*
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/*'
      - '.github/workflows/sponsors.yml'
      - '.github/workflows/translators.yml'
      - 'Graphics/*'
  pull_request:
    branches:
      - dev
    paths-ignore:
      - '**/*.md'
      - crowdin.yml
env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:

  # 
  # Base build
  #

  base:
    name: 🔨 Build Base
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch all history for all tags and branches
        run: git fetch --prune --unshallow

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v1.1.1
        with:
          versionSpec: '5.x'
          includePrerelease: false

      - name: Use GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v1.1.1

      - name: Create artifacts folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .artifacts/

      - name: Generate versioning artifact
        shell: pwsh
        run: |
          "${{ steps.gitversion.outputs.majorMinorPatch }}.${{ steps.gitversion.outputs.commitsSinceVersionSource }}" |
            Out-File .artifacts/version_4.txt
          "${{ steps.gitversion.outputs.majorMinorPatch }}.0" |
            Out-File .artifacts/version_3.txt

      - name: Restore packages
        run: dotnet restore EarTrumpet.sln
        shell: cmd

      - name: Build EarTrumpet
        shell: cmd
        run: |
          dotnet publish /p:PublishProfile=Properties\PublishProfiles\x86.pubxml EarTrumpet/EarTrumpet.csproj /p:Platform=x86 /p:OutputPath=..\.artifacts\base\x86\
          rem dotnet publish /p:PublishProfile=Properties\PublishProfiles\x64.pubxml EarTrumpet/EarTrumpet.csproj /p:Platform=x64 /p:OutputPath=..\.artifacts\base\x64\
          rem dotnet publish /p:PublishProfile=Properties\PublishProfiles\arm64.pubxml EarTrumpet/EarTrumpet.csproj /p:Platform=ARM64 /p:OutputPath=..\.artifacts\base\arm64\

      - name: Set Bugsnag API key
        shell: pwsh
        run: |
          Get-ChildItem .artifacts\base\**\app.config | ForEach-Object {
            $cfg = Get-Content $_
            $cfg | ForEach-Object { $_.Replace("{bugsnag.apikey}", "${{ secrets.bugsnag_api_key }}") } | Set-Content $_
          }

      - name: Sign all files
        uses: azure/trusted-signing-action@v0.3.20
        with:
          azure-tenant-id: ${{ secrets.azure_tenant_id }}
          azure-client-id: ${{ secrets.azure_client_id }}
          azure-client-secret: ${{ secrets.azure_client_secret }}
          endpoint: https://wus2.codesigning.azure.net/
          trusted-signing-account-name: main
          certificate-profile-name: profileTWN
          files-folder: .artifacts\base
          files-folder-recurse: true
          files-folder-depth: 1
          files-folder-filter: exe,dll
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Add to cache
        uses: actions/cache/save@v4
        with:
          key: base-${{ github.sha }}
          path: |
            .artifacts

  # 
  # Packaging: AppInstaller
  # 

  appinstaller:
    name: 📦 Package for AppInstaller
    runs-on: windows-latest
    needs: base

    env:
      channel: 'AppInstaller'
      publisher: 'CN=File-New-Project, O=File-New-Project, L=Purcellville, S=Virginia, C=US'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore base
        uses: actions/cache/restore@v4
        with:
          path: .artifacts
          key: base-${{ github.sha }}

      - name: Configure manifest
        uses: ./.github/actions/configure-manifest
        with:
          manifest: packaging/package.appxmanifest
          publisher: ${{ env.publisher }}
          branch: ${{ github.ref_name }}
          prefix: 'EarTrumpet'
          version: .artifacts/version_4.txt
      
      - name: Create bundle
        shell: pwsh
        run: >
          msbuild EarTrumpet.Package/EarTrumpet.Package.wapproj
            /p:Configuration=Release
            /p:AppxBundle=Always
            /p:Channel=AppInstaller
            /p:AppxPackageDir=..\.artifacts\sideload\
            /p:AppxPackageSigningEnabled=false
            /p:UapAppxPackageBuildMode=SideloadOnly
            /p:GenerateAppInstallerFile=true
            /p:AppxPackageTestDir=..\.artifacts\sideload\
            /p:AppInstallerUri="https://install.eartrumpet.app"

      # TODO: Complete AppInstaller pipeline

  # 
  # Packaging: Chocolatey
  # 

  chocolatey:
    name: 📦 Package for Chocolatey
    runs-on: windows-latest
    needs: base

    env:
      channel: 'Chocolatey'
      publisher: 'CN=File-New-Project, O=File-New-Project, L=Purcellville, S=Virginia, C=US'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore base
        uses: actions/cache/restore@v4
        with:
          path: .artifacts
          key: base-${{ github.sha }}

      - name: Configure manifest
        uses: ./.github/actions/configure-manifest
        with:
          manifest: packaging/package.appxmanifest
          publisher: ${{ env.publisher }}
          branch: ${{ github.ref_name }}
          prefix: 'EarTrumpet'
          version: .artifacts/version_4.txt
      
      # TODO: Complete Chocolatey pipeline

  # 
  # Packaging: Store
  #

  store:
    name: 📦 Package for Microsoft Store
    runs-on: windows-latest
    needs: base

    env:
      channel: 'Store'
      publisher: 'CN=6099D0EF-9374-47ED-BDFE-A82136831235'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore base
        uses: actions/cache/restore@v4
        with:
          path: .artifacts
          key: base-${{ github.sha }}

      - name: Configure manifest
        uses: ./.github/actions/configure-manifest
        with:
          manifest: packaging/package.appxmanifest
          publisher: ${{ env.publisher }}
          branch: ${{ github.ref_name }}
          prefix: 'EarTrumpet'
          version: .artifacts/version_3.txt
      
      # TODO: Complete Store pipeline

  # 
  # Packaging: GitHub Releases
  #

  github:
    name: 📦 Package for GitHub Release
    runs-on: windows-latest
    needs: base

    env:
      channel: 'GitHub'
      publisher: 'CN=File-New-Project, O=File-New-Project, L=Purcellville, S=Virginia, C=US'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore base
        uses: actions/cache/restore@v4
        with:
          path: .artifacts
          key: base-${{ github.sha }}

      - name: Configure manifest
        uses: ./.github/actions/configure-manifest
        with:
          manifest: packaging/package.appxmanifest
          publisher: ${{ env.publisher }}
          branch: ${{ github.ref_name }}
          prefix: 'EarTrumpet'
          version: .artifacts/version_4.txt
      
      # TODO: Complete GitHub Release pipeline
